site_name: XLB Documentation
site_url: https://docs.runxlb.com
site_description: XDP-native IPv4/TCP Layer 4 load balancer
site_author: Neuronic

theme:
  name: material
  logo: assets/xlb-mark.svg
  favicon: assets/xlb-mark.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Start:
    - XLB Overview: index.md
    - Choose a Deployment: getting-started/installation.md
  - Kubernetes:
    - Quick Start: getting-started/kubernetes.md
    - Deployment Guide: deployment/kubernetes.md
    - Helm Reference: deployment/helm.md
  - Bare Metal:
    - Quick Start: getting-started/quickstart.md
  - Configuration:
    - Overview: configuration/index.md
    - Reference: configuration/reference.md
  - Operations:
    - Admin Console: operations/admin-console.md
    - Observability: operations/observability.md
    - Connections and Upgrades: operations/connection-lifecycle.md
    - Troubleshooting: operations/troubleshooting.md
  - Architecture: architecture.md
  - runxlb.com: https://runxlb.com

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
