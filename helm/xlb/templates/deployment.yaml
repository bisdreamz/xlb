apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xlb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xlb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "xlb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "xlb.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "xlb.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        {{- if .Values.image.digest }}
        image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
        {{- else }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        {{- end }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        env:
        - name: RUST_LOG
          value: {{ .Values.env.RUST_LOG | quote }}
        {{- if .Values.config.admin.auth.enabled }}
        - name: XLB_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ required "config.admin.auth.existingSecret is required when admin auth is enabled" .Values.config.admin.auth.existingSecret | quote }}
              key: {{ required "config.admin.auth.passwordKey is required when admin auth is enabled" .Values.config.admin.auth.passwordKey | quote }}
        {{- end }}
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: XLB_CPU_LIMIT_MILLICORES
          valueFrom:
            resourceFieldRef:
              containerName: {{ .Chart.Name }}
              resource: limits.cpu
              divisor: 1m

        {{- if .Values.startupProbe }}
        startupProbe:
          {{- toYaml .Values.startupProbe | nindent 12 }}
        {{- else }}
        startupProbe:
          httpGet:
            host: {{ include "xlb.adminProbeHost" . | quote }}
            path: /healthz
            port: {{ .Values.config.admin.port }}
            scheme: HTTP
          periodSeconds: 2
          timeoutSeconds: 1
          failureThreshold: 30
        {{- end }}

        {{- if .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        {{- else }}
        livenessProbe:
          httpGet:
            host: {{ include "xlb.adminProbeHost" . | quote }}
            path: /healthz
            port: {{ .Values.config.admin.port }}
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        {{- end }}

        {{- if .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        {{- else }}
        readinessProbe:
          httpGet:
            host: {{ include "xlb.adminProbeHost" . | quote }}
            path: /readyz
            port: {{ .Values.config.admin.port }}
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 1
          timeoutSeconds: 1
          failureThreshold: 3
        {{- end }}

        resources:
          {{- toYaml .Values.resources | nindent 12 }}

        volumeMounts:
        - name: config
          mountPath: /app/xlb.yaml
          subPath: xlb.yaml
          readOnly: true
        - name: bpffs
          mountPath: /sys/fs/bpf
        - name: debugfs
          mountPath: /sys/kernel/debug

      volumes:
      - name: config
        configMap:
          name: {{ include "xlb.fullname" . }}-config
      - name: bpffs
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
          type: Directory

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
