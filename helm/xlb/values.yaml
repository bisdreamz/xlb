replicaCount: 2

image:
  repository: emaczura/xlb
  pullPolicy: IfNotPresent
  # Defaults to Chart.appVersion when empty. Prefer digest for production releases.
  tag: ""
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

securityContext:
  capabilities:
    add:
      - NET_ADMIN
      - SYS_ADMIN
      - BPF
  privileged: true

service:
  # The chart creates a headless discovery Service. It publishes the XLB Pod
  # addresses without allocating a virtual IP or adding kube-proxy load
  # balancing in front of XLB.
  enabled: true
  annotations: {}

resources:
  limits:
    cpu: 4000m
    memory: 512Mi
  requests:
    cpu: 2000m
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - xlb
        # Prevent XLB releases in different namespaces from attaching to the
        # same node interface.
        namespaceSelector: {}
        topologyKey: kubernetes.io/hostname

# Graceful shutdown configuration
# terminationGracePeriodSeconds should be shutdown_timeout + buffer
terminationGracePeriodSeconds: 90

# ExternalDNS integration
externalDNS:
  # Enable only after configuring ExternalDNS to publish the addresses of
  # headless, host-networked XLB endpoints for the target DNS provider.
  enabled: false
  # DNS TTL - should match xlb.yaml shutdown_timeout
  ttl: 60

# XLB configuration
config:
  # Optional: service name for metrics
  # If not set, defaults to kubernetes service name
  name: ""

  # Listen address (auto or specific IP)
  listen: auto

  # Protocol: tcp (udp is rejected until its dataplane is implemented)
  proto: tcp

  # Port mappings
  ports:
    - local_port: 80
      remote_port: 8080

  # Backend provider
  provider:
    # For Kubernetes deployments
    kubernetes:
      namespace: default
      service: backend-service
    # For static deployments (comment out kubernetes above)
    # static:
    #   backends:
    #     - name: backend-1
    #       ip: 10.0.1.10

  # Routing mode: nat (dsr is currently rejected)
  mode: nat

  # Orphaned connection TTL (seconds). Values below 300 are raised to 300 at startup.
  orphan_ttl_secs: 300

  # Graceful shutdown timeout - should match DNS TTL
  shutdown_timeout: 60

  # HTTP health and status API. Keep loopback unless access is protected by
  # authentication and a secure deployment transport such as TLS or a VPN.
  admin:
    address: 127.0.0.1
    port: 9090
    auth:
      # Protect `/admin/` and `/api/v1/status` with HTTP Basic auth. Health and
      # readiness probes remain unauthenticated. The chart never stores the
      # password in this values file; it must already exist in a Secret.
      enabled: false
      username: admin
      existingSecret: ""
      passwordKey: password

  resources:
    # Optional per-interface capacity override for cloud/virtual NICs whose
    # drivers report an unknown link speed. Physical NICs are auto-detected.
    network_capacity_mbps: null

  # OpenTelemetry configuration
  otel:
    enabled: false
    endpoint: "http://opentelemetry-collector:4317"
    export_interval_secs: 10
    protocol: grpc
    headers: {}
      # Example for authentication:
      # Authorization: "Bearer token"

# Optional complete probe overrides. When empty, the chart uses `/readyz` and
# `/healthz` on config.admin with production-safe defaults. The startup probe
# allows 60 seconds for Kubernetes discovery and XDP attachment.
startupProbe: {}
readinessProbe: {}
livenessProbe: {}

env:
  RUST_LOG: "info"
